name: Sync checklist flag UI

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/sync-checklist-flag-ui.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Restore deployed ChecklistTree
        shell: bash
        run: |
          curl -fsSL https://raw.githubusercontent.com/AndreiRH/rhfield-ff2c2b25/70f83d3c9be3b7ee033e53ba4684c9e0bf506b15/.github/workflows/sync-checklist-flag-ui.yml \
            | awk '/^H4sIA/{print}' \
            | base64 -d \
            | gzip -d > src/components/ChecklistTree.tsx
          test -s src/components/ChecklistTree.tsx
      - name: Build
        run: |
          npm install --no-audit --no-fund
          npm run build
      - name: Commit synced code
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/ChecklistTree.tsx
          if git diff --cached --quiet; then
            echo "ChecklistTree already synced"
          else
            git commit -m "Sync checklist flag UI"
            git push
          fi
