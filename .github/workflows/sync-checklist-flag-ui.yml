name: Sync checklist flag UI

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/sync-checklist-flag-ui.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Restore deployed ChecklistTree
        shell: bash
        run: |
          cat > /tmp/ChecklistTree.tsx.gz.b64 <<'EOF'

EOF
          base64 -d /tmp/ChecklistTree.tsx.gz.b64 | gzip -d > src/components/ChecklistTree.tsx
      - name: Build
        run: |
          npm ci
          npm run build
      - name: Commit synced code
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/ChecklistTree.tsx
          if git diff --cached --quiet; then
            echo "ChecklistTree already synced"
          else
            git commit -m "Sync checklist flag UI"
            git push
          fi
