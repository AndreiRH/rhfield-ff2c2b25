name: Sync checklist flag colors

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch checklist tree
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'src/components/ChecklistTree.tsx';
          let tree = fs.readFileSync(path, 'utf8');
          const replacements = [
            ['const FLAG_SEVERITY: Record<FlagPriority, number> = { yellow: 1, red: 2, black: 3 };', 'const FLAG_SEVERITY: Record<FlagPriority, number> = { yellow: 1, orange: 2, red: 3 };'],
            ['meta.priority === "black"', 'meta.priority === "red"'],
            ['Black flags need a short reason.', 'Red flags need a short reason.'],
            ['draftFlag.priority === "black"', 'draftFlag.priority === "red"'],
          ];
          for (const [from, to] of replacements) tree = tree.split(from).join(to);
          fs.writeFileSync(path, tree);
          NODE
      - name: Commit source sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/ChecklistTree.tsx
          git diff --cached --quiet && exit 0
          git commit -m "Sync checklist flag colors in source"
          git push
