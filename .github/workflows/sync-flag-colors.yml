name: Sync flag colors

on:
  push:
    paths:
      - .github/workflows/sync-flag-colors.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update flag colors
        run: |
          node <<'NODE'
          const fs = require('fs');

          function replace(path, from, to) {
            const text = fs.readFileSync(path, 'utf8');
            if (!text.includes(from)) throw new Error(`${path} missing expected text: ${from}`);
            fs.writeFileSync(path, text.replace(from, to));
          }

          replace('src/lib/checklist-flags.ts',
            'export type FlagPriority = "yellow" | "red" | "black";',
            'export type FlagPriority = "yellow" | "orange" | "red";');
          replace('src/lib/checklist-flags.ts',
            `export const FLAG_DEFAULT_DAYS: Record<FlagPriority, number> = {
  black: 1,
  red: 7,
  yellow: 14,
};`,
            `export const FLAG_DEFAULT_DAYS: Record<FlagPriority, number> = {
  red: 1,
  orange: 7,
  yellow: 14,
};`);
          replace('src/lib/checklist-flags.ts',
            `export const FLAG_PRIORITIES: Array<{
  key: FlagPriority;
  label: string;
  description: string;
}> = [
  { key: "black", label: "Black", description: "Critical. Stop and resolve fast." },
  { key: "red", label: "Red", description: "Important. Should not wait long." },
  { key: "yellow", label: "Yellow", description: "Watch item. Can wait briefly." },
];`,
            `export const FLAG_PRIORITIES: Array<{
  key: FlagPriority;
  label: string;
  description: string;
}> = [
  { key: "red", label: "Red", description: "Critical. Stop and resolve fast." },
  { key: "orange", label: "Orange", description: "Important. Should not wait long." },
  { key: "yellow", label: "Yellow", description: "Watch item. Can wait briefly." },
];`);
          replace('src/lib/checklist-flags.ts',
            '  return value === "yellow" || value === "red" || value === "black";',
            '  return value === "yellow" || value === "orange" || value === "red";');
          replace('src/lib/checklist-flags.ts',
            `  const priority = isPriority(input?.priority ?? input?.flag_priority)
    ? (input.priority ?? input.flag_priority)
    : fallbackPriority;`,
            `  const rawPriority = input?.priority ?? input?.flag_priority;
  const priority = rawPriority === "black"
    ? "red"
    : isPriority(rawPriority)
    ? rawPriority
    : fallbackPriority;`);

          let flags = fs.readFileSync('src/lib/checklist-flags.ts', 'utf8');
          flags = flags.replace(/export function flagPriorityClasses\(priority: FlagPriority\) \{[\s\S]*$/, `export function flagPriorityClasses(priority: FlagPriority) {
  if (priority === "red") {
    return {
      text: "text-destructive",
      badge: "border-destructive/50 bg-destructive text-destructive-foreground",
      soft: "border-destructive/40 bg-destructive/10 text-destructive",
      hover: "hover:bg-destructive/15 hover:text-destructive",
      row: "border-destructive/60 bg-destructive/10",
    };
  }
  if (priority === "orange") {
    return {
      text: "text-orange-700 dark:text-orange-300",
      badge: "border-orange-500/60 bg-orange-500 text-white",
      soft: "border-orange-400/60 bg-orange-100 text-orange-900 dark:border-orange-300/50 dark:bg-orange-950/50 dark:text-orange-200",
      hover: "hover:bg-orange-100 hover:text-orange-800 dark:hover:bg-orange-950/50 dark:hover:text-orange-200",
      row: "border-orange-400/60 bg-orange-50 dark:border-orange-300/40 dark:bg-orange-950/30",
    };
  }
  return {
    text: "text-amber-700 dark:text-amber-300",
    badge: "border-amber-500/60 bg-amber-400 text-amber-950",
    soft: "border-amber-400/60 bg-amber-100 text-amber-900 dark:border-amber-300/50 dark:bg-amber-950/50 dark:text-amber-200",
    hover: "hover:bg-amber-100 hover:text-amber-800 dark:hover:bg-amber-950/50 dark:hover:text-amber-200",
    row: "border-amber-400/60 bg-amber-50 dark:border-amber-300/40 dark:bg-amber-950/30",
  };
}
`);
          fs.writeFileSync('src/lib/checklist-flags.ts', flags);

          let tree = fs.readFileSync('src/components/ChecklistTree.tsx', 'utf8');
          tree = tree
            .replace('const FLAG_SEVERITY: Record<FlagPriority, number> = { yellow: 1, red: 2, black: 3 };', 'const FLAG_SEVERITY: Record<FlagPriority, number> = { yellow: 1, orange: 2, red: 3 };')
            .replaceAll('meta.priority === "black"', 'meta.priority === "red"')
            .replaceAll('Black flags need a short reason.', 'Red flags need a short reason.')
            .replaceAll('draftFlag.priority === "black"', 'draftFlag.priority === "red"');
          fs.writeFileSync('src/components/ChecklistTree.tsx', tree);

          let migration = fs.readFileSync('supabase/migrations/20260525113000_add_checklist_flag_metadata.sql', 'utf8');
          migration = migration.replace("flag_priority IN ('yellow', 'red', 'black')", "flag_priority IN ('yellow', 'orange', 'red')");
          fs.writeFileSync('supabase/migrations/20260525113000_add_checklist_flag_metadata.sql', migration);

          fs.writeFileSync('supabase/migrations/20260526100000_replace_black_flags_with_red.sql', `UPDATE public.checklist_items
SET flag_priority = 'red',
    flag_wait_days = COALESCE(flag_wait_days, 1),
    flag_due_date = COALESCE(flag_due_date, CURRENT_DATE + 1)
WHERE flag_priority = 'black';

UPDATE public.checklist_items
SET flag_priority = 'orange',
    flag_wait_days = COALESCE(flag_wait_days, 7),
    flag_due_date = COALESCE(flag_due_date, CURRENT_DATE + 7)
WHERE flag_priority = 'red'
  AND flagged = true
  AND flag_wait_days = 7;

ALTER TABLE public.checklist_items
  DROP CONSTRAINT IF EXISTS checklist_items_flag_priority_check,
  ADD CONSTRAINT checklist_items_flag_priority_check
    CHECK (flag_priority IS NULL OR flag_priority IN ('yellow', 'orange', 'red'));
`);
          NODE
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/checklist-flags.ts src/components/ChecklistTree.tsx supabase/migrations/20260525113000_add_checklist_flag_metadata.sql supabase/migrations/20260526100000_replace_black_flags_with_red.sql
          git diff --cached --quiet && exit 0
          git commit -m "Replace black flags with orange and red"
          git push
